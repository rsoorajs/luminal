name: Test Metal

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

jobs:
    metal_unit_test:
        name: Metal Unit Tests
        runs-on: macos-14
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v6
            - name: Run Metal crate tests
              run: rustup update; cargo test -p luminal_metal --verbose -- --test-threads=1
