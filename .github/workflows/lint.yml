name: Lint

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    ruff:
        name: Ruff
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v6
            - name: Install pre-commit
              run: python3 -m pip install pre-commit
            - name: Run ruff lint hook
              run: pre-commit run ruff-check --all-files

    ruff_format:
        name: Ruff Format
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v6
            - name: Install pre-commit
              run: python3 -m pip install pre-commit
            - name: Run ruff format hook
              run: pre-commit run ruff-format --all-files

    clippy:
        name: Clippy
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v6
            - name: Install pre-commit
              run: python3 -m pip install pre-commit
            - name: Update Rust toolchain
              run: rustup update
            - name: Run clippy hook
              run: pre-commit run cargo-clippy --all-files

    metal_clippy:
        name: Metal Clippy
        runs-on: macos-14
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v6
            - name: Install pre-commit
              run: python3 -m pip install pre-commit
            - name: Update Rust toolchain
              run: rustup update
            - name: Run metal clippy hook
              run: pre-commit run --hook-stage manual cargo-clippy-metal --all-files

    fmt:
        name: Fmt
        runs-on: ubuntu-latest
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v6
            - name: Install pre-commit
              run: python3 -m pip install pre-commit
            - name: Run fmt hook
              run: pre-commit run cargo-fmt --all-files
