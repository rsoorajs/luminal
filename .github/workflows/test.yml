name: Test

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch:

env:
    CARGO_TERM_COLOR: always

jobs:
    core_unit_test:
        name: Core Unit Tests
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/luminal-ai/luminal-docker:cpu
        timeout-minutes: 20

        steps:
            - uses: actions/checkout@v6
            - name: Run tests
              run: cargo test --workspace --exclude luminal_cuda_lite --exclude luminal_metal --exclude luminal_bench --verbose
    metal_unit_test:
        name: Metal Unit Tests
        runs-on: macos-14
        timeout-minutes: 30

        steps:
            - uses: actions/checkout@v6
            - name: Run Metal crate tests
              run: rustup update; cargo test -p luminal_metal --verbose -- --test-threads=1
    python_native_tests:
        name: Python Native Tests
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/luminal-ai/luminal-docker:cpu
        timeout-minutes: 45
        defaults:
            run:
                working-directory: crates/luminal_python

        steps:
            - uses: actions/checkout@v6
            - name: Update Rust toolchain
              run: rustup update
            - name: Build maturin extension
              run: uv run maturin develop --manifest-path rust/Cargo.toml
            - name: Run pytest
              run: uv run pytest tests/ -v

    python_cuda_tests:
        name: Python CUDA Tests
        runs-on: ubuntu-latest
        environment: Modal
        timeout-minutes: 60
        defaults:
            run:
                working-directory: crates/luminal_python

        steps:
            - uses: actions/checkout@v6
            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"
            - name: Install Modal
              run: pip install modal
            - name: Run pytest with CUDA backend on Modal
              env:
                  MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
                  MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
              run: modal run modal_pytest_runner.py --gpu A100 --timeout 3300 tests/ -v -s
